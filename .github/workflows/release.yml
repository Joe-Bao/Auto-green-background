name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m unittest discover -s tests -p "test_*.py"

      - name: Build standalone EXE
        shell: pwsh
        run: |
          uv run --with pyinstaller pyinstaller `
            --noconfirm `
            --clean `
            --name AutoGreenBackground `
            --windowed `
            --add-data "web;web" `
            main.py

      - name: Archive Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path dist/AutoGreenBackground/* -DestinationPath release/AutoGreenBackground-windows-x64.zip -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGreenBackground-windows-x64
          path: release/AutoGreenBackground-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/AutoGreenBackground-windows-x64.zip
          generate_release_notes: true

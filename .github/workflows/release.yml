name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m unittest discover -s tests -p "test_*.py"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend and tauri dependencies
        run: |
          npm install
          npm --prefix frontend install

      - name: Build Tauri app bundle
        run: npm run tauri:build

      - name: Build portable package
        run: npm run tauri:build:portable

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-windows
          path: src-tauri/target/release/bundle/**

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-portable-windows
          path: dist-portable/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*
            dist-portable/*.zip
          generate_release_notes: true
